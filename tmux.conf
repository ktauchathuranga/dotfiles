# ==========================
# Basic Quality of Life Settings
# ==========================

# Enable mouse support (allows clicking to select panes, resizing, and scrolling)
set -g mouse on

# Start window and pane numbering at 1 instead of 0 (easier to reach on the keyboard!)
set -g base-index 1
setw -g pane-base-index 1

# ==========================
# Key Bindings (Shortcuts)
# ==========================

# Make splitting panes more intuitive: use | for vertical and - for horizontal
bind | split-window -h
bind - split-window -v

# Quickly reload this tmux config using: Prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ==========================
# Status Bar Customization
# ==========================

# Left side: Show the current session name in bright green
set -g status-left-length 40
set -g status-left "#[fg=green,bold] Session: #S #[default]  "

# Right side: Show a cyan date and yellow time
set -g status-right "#[fg=cyan]%b %d #[fg=yellow]%H:%M"

# Active window tab: Highlight the window you are currently using in green
set-window-option -g window-status-current-style bg=green,fg=black,bold